<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IRL PRO Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#hud {
  position: absolute;
  top: 28px;
  left: 28px;
  min-width: 280px;
  padding: 14px 16px;
  border-radius: 16px;
  background: rgba(0, 0, 0, 0.68);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
}

.row-top {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: #ffffff;
  font-size: 18px;
  font-weight: 800;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
}

#time {
  color: #00eaff;
  text-shadow:
    0 0 4px #00eaff,
    0 0 10px rgba(0,234,255,0.6);
}

#weather {
  color: #00ff88;
  text-shadow:
    0 0 4px #00ff88,
    0 0 8px rgba(0,255,136,0.5);
}

#speed {
  margin-top: 2px;
  line-height: 1;
  font-size: 68px;
  font-weight: 900;
  color: #ffffff;
  text-shadow:
    0 2px 4px rgba(0,0,0,0.9),
    0 0 10px rgba(255,255,255,0.08);
}

#speedUnit {
  font-size: 24px;
  font-weight: 800;
  margin-left: 8px;
  opacity: 0.95;
}

#dir {
  margin-top: 8px;
  font-size: 22px;
  font-weight: 800;
  color: #ffd84d;
  text-shadow:
    0 0 4px rgba(255,216,77,0.6),
    1px 1px 2px rgba(0,0,0,0.8);
}

#status {
  margin-top: 6px;
  font-size: 15px;
  color: rgba(255,255,255,0.82);
}

.speed-stop {
  color: #ffffff;
  text-shadow:
    0 0 4px rgba(255,255,255,0.4),
    1px 1px 2px rgba(0,0,0,0.9);
}

.speed-walk {
  color: #00ff88;
  text-shadow:
    0 0 5px rgba(0,255,136,0.8),
    1px 1px 2px rgba(0,0,0,0.9);
}

.speed-ride {
  color: #00eaff;
  text-shadow:
    0 0 6px rgba(0,234,255,0.9),
    1px 1px 2px rgba(0,0,0,0.9);
}

.speed-fast {
  color: #ff9f1a;
  text-shadow:
    0 0 6px rgba(255,159,26,0.9),
    1px 1px 2px rgba(0,0,0,0.9);
}

.speed-veryfast {
  color: #ff3df5;
  text-shadow:
    0 0 6px rgba(255,61,245,0.9),
    1px 1px 2px rgba(0,0,0,0.9);
}
</style>
</head>

<body>
  <div id="hud">
    <div class="row-top">
      <div id="time" class="badge">--:--</div>
      <div id="weather" class="badge">Loading...</div>
    </div>

    <div>
      <span id="speed" class="speed-stop">0.0</span>
      <span id="speedUnit" class="speed-stop">km/h</span>
    </div>

    <div id="dir">Direction: --</div>
    <div id="status">GPS: waiting...</div>
  </div>

<script>
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime, 1000);
updateTime();

async function getWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.42&longitude=-75.69&current_weather=true");
    const data = await res.json();
    const temp = data.current_weather.temperature;
    document.getElementById("weather").innerText = temp + "°C Ottawa";
  } catch {
    document.getElementById("weather").innerText = "Weather error";
  }
}
getWeather();
setInterval(getWeather, 600000);

function getDirectionFromHeading(deg) {
  if (deg == null || isNaN(deg)) return "--";
  const dirs = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
  const index = Math.round(deg / 45) % 8;
  return dirs[index];
}

function applySpeedClass(kmh) {
  const speedEl = document.getElementById("speed");
  const unitEl = document.getElementById("speedUnit");

  const classes = ["speed-stop", "speed-walk", "speed-ride", "speed-fast", "speed-veryfast"];
  speedEl.classList.remove(...classes);
  unitEl.classList.remove(...classes);

  let cls = "speed-stop";
  if (kmh >= 1 && kmh < 7) cls = "speed-walk";
  else if (kmh >= 7 && kmh < 18) cls = "speed-ride";
  else if (kmh >= 18 && kmh < 35) cls = "speed-fast";
  else if (kmh >= 35) cls = "speed-veryfast";

  speedEl.classList.add(cls);
  unitEl.classList.add(cls);
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    pos => {
      const speedRaw = pos.coords.speed;
      const headingRaw = pos.coords.heading;

      const kmh = speedRaw == null ? 0 : speedRaw * 3.6;
      document.getElementById("speed").innerText = kmh.toFixed(1);
      applySpeedClass(kmh);

      const dir = getDirectionFromHeading(headingRaw);
      document.getElementById("dir").innerText = "Direction: " + dir;

      let status = "GPS: ok";
      if (speedRaw == null) status = "GPS: speed unavailable";
      document.getElementById("status").innerText = status;
    },
    err => {
      document.getElementById("status").innerText = "GPS error";
      document.getElementById("dir").innerText = "Direction: --";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    }
  );
} else {
  document.getElementById("status").innerText = "GPS unsupported";
}
</script>
</body>
</html>
