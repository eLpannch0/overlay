<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay PRO</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ОСНОВНОЙ БЛОК */
#box {
  position: absolute;
  top: 20px;
  left: 20px;

  background: rgba(0,0,0,0.78);
  padding: 20px 25px;
  border-radius: 20px;

  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

  color: white;
  min-width: 260px;
}

/* ВЕРХ */
#top {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.badge {
  background: rgba(255,255,255,0.1);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: bold;
}

/* ВРЕМЯ */
#time {
  color: #00eaff;
}

/* ПОГОДА */
#weather {
  color: #00ff9c;
}

/* СКОРОСТЬ */
#speedWrap {
  display: flex;
  align-items: baseline;
}

#speed {
  font-size: 80px;
  font-weight: 900;
  line-height: 1;
}

#unit {
  font-size: 22px;
  margin-left: 6px;
  opacity: 0.8;
  position: relative;
  top: -10px;
}

/* НАПРАВЛЕНИЕ */
#dir {
  margin-top: 10px;
  font-size: 22px;
  font-weight: bold;
  color: #ffd54f;
}
</style>

</head>
<body>

<div id="box">

  <div id="top">
    <div id="time" class="badge">--:--</div>
    <div id="weather" class="badge">...</div>
  </div>

  <div id="speedWrap">
    <div id="speed">0.0</div>
    <div id="unit">km/h</div>
  </div>

  <div id="dir">--</div>

</div>

<script>

/* ВРЕМЯ */
function updateTime() {
  const now = new Date();
  const t = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  document.getElementById("time").innerText = t;
}
setInterval(updateTime, 1000);
updateTime();

/* ПОГОДА (Оттава) */
async function getWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.42&longitude=-75.69&current_weather=true");
    const data = await res.json();
    let temp = data.current_weather.temperature;
    document.getElementById("weather").innerText = temp + "°C Ottawa";
  } catch {
    document.getElementById("weather").innerText = "--°C";
  }
}
getWeather();
setInterval(getWeather, 600000);

/* НАПРАВЛЕНИЕ */
function getDir(deg) {
  if (deg == null) return "--";
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(deg / 45) % 8];
}

/* GPS СКОРОСТЬ */
navigator.geolocation.watchPosition(pos => {

  let speed = pos.coords.speed;

  if (speed == null) speed = 0;

  let kmh = speed * 3.6;

  document.getElementById("speed").innerText = kmh.toFixed(1);

  document.getElementById("dir").innerText =
    getDir(pos.coords.heading) + " ↑";

},
err => {
  document.getElementById("speed").innerText = "0.0";
});

</script>

</body>
</html>
