<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#box {
  position: absolute;
  top: 40px;
  left: 40px;
}

#time {
  font-size: 58px;
  font-weight: 900;
  color: #ffffff;
  -webkit-text-stroke: 2px #00d9ff;
  text-shadow:
    0 0 4px rgba(0, 217, 255, 0.9),
    0 0 10px rgba(0, 217, 255, 0.8),
    2px 2px 6px rgba(0,0,0,0.85);
}

#weather {
  margin-top: 4px;
  font-size: 26px;
  font-weight: 800;
  color: #ffffff;
  -webkit-text-stroke: 1px #00ff88;
  text-shadow:
    0 0 4px rgba(0, 255, 136, 0.9),
    0 0 10px rgba(0, 255, 136, 0.7),
    2px 2px 6px rgba(0,0,0,0.85);
}

#speed {
  margin-top: 6px;
  font-size: 30px;
  font-weight: 900;
  color: #ffffff;
  -webkit-text-stroke: 1px #ff3df5;
  text-shadow:
    0 0 4px rgba(255, 61, 245, 0.9),
    0 0 10px rgba(255, 61, 245, 0.7),
    2px 2px 6px rgba(0,0,0,0.85);
}
</style>
</head>

<body>

<div id="box">
  <div id="time">--:--</div>
  <div id="weather">Loading...</div>
  <div id="speed">0.0 km/h</div>
</div>

<script>
function updateTime() {
  const now = new Date();
  let h = now.getHours().toString().padStart(2, '0');
  let m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime, 1000);
updateTime();

async function getWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.42&longitude=-75.69&current_weather=true");
    const data = await res.json();
    let temp = data.current_weather.temperature;
    document.getElementById("weather").innerText = temp + "°C Ottawa";
  } catch {
    document.getElementById("weather").innerText = "No weather";
  }
}
getWeather();
setInterval(getWeather, 600000);

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    let speed = pos.coords.speed;
    if (speed === null) {
      document.getElementById("speed").innerText = "0.0 km/h";
    } else {
      let kmh = (speed * 3.6).toFixed(1);
      document.getElementById("speed").innerText = kmh + " km/h";
    }
  });
}
</script>

</body>
</html>
