<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#box {
  position: absolute;
  top: 40px;
  left: 40px;
}

/* ВРЕМЯ */
#time {
  font-size: 56px;
  font-weight: 900;
  color: #00eaff;

  text-shadow:
    0 0 5px #00eaff,
    0 0 10px #00eaff,
    0 0 20px #00eaff,
    0 0 40px #00eaff;
}

/* ПОГОДА */
#weather {
  font-size: 24px;
  font-weight: 700;
  color: #00ff88;

  text-shadow:
    0 0 5px #00ff88,
    0 0 10px #00ff88,
    0 0 20px #00ff88;
}

/* СКОРОСТЬ */
#speed {
  font-size: 28px;
  font-weight: 900;
  color: #ff3df5;

  text-shadow:
    0 0 5px #ff3df5,
    0 0 10px #ff3df5,
    0 0 20px #ff3df5,
    0 0 40px #ff3df5;
}
</style>
</head>

<body>

<div id="box">
  <div id="time">--:--</div>
  <div id="weather">Loading...</div>
  <div id="speed">0 km/h</div>
</div>

<script>
// ВРЕМЯ
function updateTime() {
  const now = new Date();
  let h = now.getHours().toString().padStart(2, '0');
  let m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime, 1000);
updateTime();

// ПОГОДА
async function getWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.42&longitude=-75.69&current_weather=true");
    const data = await res.json();
    let temp = data.current_weather.temperature;
    document.getElementById("weather").innerText = temp + "°C Ottawa";
  } catch {
    document.getElementById("weather").innerText = "No weather";
  }
}
getWeather();
setInterval(getWeather, 600000);

// GPS СКОРОСТЬ
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    let speed = pos.coords.speed;
    if (speed === null) {
      document.getElementById("speed").innerText = "0 km/h";
    } else {
      let kmh = (speed * 3.6).toFixed(1);
      document.getElementById("speed").innerText = kmh + " km/h";
    }
  });
}
</script>

</body>
</html>
