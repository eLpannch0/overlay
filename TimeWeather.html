<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IRL ULTRA HUD + Location</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#hud {
  position: absolute;
  top: 20px;
  left: 20px;

  min-width: 340px;
  padding: 18px 22px 16px;
  border-radius: 24px;

  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 15px 40px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* TOP */
#top {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.badge {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  background: rgba(255,255,255,0.06);
}

#time {
  color: #00d9ff;
  text-shadow: 0 0 10px rgba(0,217,255,0.6);
}

#weather {
  color: #41ff8f;
  text-shadow: 0 0 10px rgba(65,255,143,0.5);
}

#location {
  color: #ffd84d;
  text-shadow: 0 0 10px rgba(255,216,77,0.35);
  max-width: 280px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* SPEED */
#speedWrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

#speed {
  font-size: 100px;
  font-weight: 900;
  letter-spacing: -3px;

  color: #ffffff;

  text-shadow:
    0 3px 6px rgba(0,0,0,1),
    0 0 15px rgba(255,255,255,0.15),
    0 0 35px rgba(255,255,255,0.08);

  animation: pulse 2s infinite ease-in-out;
}

#unit {
  font-size: 20px;
  font-weight: 700;
  opacity: 0.9;
  margin-bottom: 16px;
}

/* DIRECTION */
#dir {
  margin-top: 6px;
  font-size: 26px;
  font-weight: 900;

  color: #ffd84d;

  text-shadow:
    0 0 10px rgba(255,216,77,0.4),
    0 1px 3px rgba(0,0,0,1);
}

/* SPEED COLORS */
.speed-stop { color: #ffffff; }
.speed-walk { color: #41ff8f; }
.speed-ride { color: #00d9ff; }
.speed-fast { color: #ffb020; }
.speed-vfast { color: #ff4df0; }

/* ANIMATION */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="hud">
  <div id="top">
    <div id="time" class="badge">--:--</div>
    <div id="weather" class="badge">--°C</div>
    <div id="location" class="badge">Locating...</div>
  </div>

  <div id="speedWrap">
    <div id="speed" class="speed-stop">0.0</div>
    <div id="unit">km/h</div>
  </div>

  <div id="dir">--</div>
</div>

<script>
// TIME
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime, 1000);
updateTime();

// WEATHER by current GPS
async function getWeather(lat, lon) {
  try {
    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
    );
    const data = await res.json();
    const temp = data.current_weather.temperature;
    document.getElementById("weather").innerText = temp + "°C";
  } catch {
    document.getElementById("weather").innerText = "--°C";
  }
}

// LOCATION by reverse geocoding
async function getLocation(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=14&addressdetails=1`,
      {
        headers: {
          "Accept-Language": "en"
        }
      }
    );
    const data = await res.json();

    const addr = data.address || {};
    const area =
      addr.suburb ||
      addr.neighbourhood ||
      addr.city_district ||
      addr.town ||
      addr.city ||
      addr.village ||
      addr.state ||
      "Unknown";

    document.getElementById("location").innerText = area;
  } catch {
    document.getElementById("location").innerText = "Location unavailable";
  }
}

// DIRECTION
function getDir(deg) {
  if (deg == null || isNaN(deg)) return "--";
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(deg / 45) % 8] + " ↑";
}

// SPEED COLOR
function setSpeedClass(kmh) {
  const el = document.getElementById("speed");
  el.className = "";

  if (kmh < 1) el.classList.add("speed-stop");
  else if (kmh < 7) el.classList.add("speed-walk");
  else if (kmh < 18) el.classList.add("speed-ride");
  else if (kmh < 35) el.classList.add("speed-fast");
  else el.classList.add("speed-vfast");
}

// GPS
let lastLocationUpdate = 0;

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      let speed = pos.coords.speed || 0;
      let kmh = speed * 3.6;

      let display = kmh < 0.5
        ? (Math.random() * 0.2).toFixed(1)
        : kmh.toFixed(1);

      document.getElementById("speed").innerText = display;
      document.getElementById("dir").innerText = getDir(pos.coords.heading);

      setSpeedClass(kmh);
      getWeather(lat, lon);

      const now = Date.now();
      if (now - lastLocationUpdate > 30000) {
        getLocation(lat, lon);
        lastLocationUpdate = now;
      }
    },
    () => {
      document.getElementById("speed").innerText = "0.0";
      document.getElementById("dir").innerText = "--";
      document.getElementById("location").innerText = "GPS denied";
      setSpeedClass(0);
    },
    { enableHighAccuracy: true }
  );
}
</script>

</body>
</html>
