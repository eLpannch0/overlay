<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRL HUD FINAL</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.hud {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    color: white;
}

/* GLASS CARD */
.card {
    background: rgba(20,20,20,0.4);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* TOP BAR */
.topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: bold;
}

.live-dot {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

.time {
    font-size: 32px;
}

.small {
    opacity: 0.7;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="hud">

    <div class="card topbar">
        <div class="live-dot"></div>
        <div>LIVE</div>
        <div id="city">Loading...</div>
        <div id="temp">--°C</div>
    </div>

    <div class="card">
        <div class="small">TIME</div>
        <div id="time" class="time">00:00</div>
    </div>

</div>

<script>

// TIME
function updateTime() {
    const now = new Date();
    let h = now.getHours().toString().padStart(2,'0');
    let m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime, 1000);
updateTime();


// CITY + WEATHER (без GPS)
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(loc => {
    document.getElementById("city").innerText = loc.city;

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true`)
    .then(r => r.json())
    .then(w => {
        document.getElementById("temp").innerText = Math.round(w.current_weather.temperature) + "°C";
    });
});

</script>

</body>
</html>
