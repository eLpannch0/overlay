<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stable IRL HUD</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      min-width: 340px;
      padding: 18px 22px 16px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
      color: white;
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 12px;
      font-weight: 700;
      font-size: 15px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }

    .time {
      color: #8fd3ff;
    }

    .temp {
      color: #8dff9b;
    }

    .city {
      color: #ffffff;
      opacity: 0.95;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .main {
      font-size: 64px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.16);
      color: rgba(255,255,255,0.92);
    }

    .sub {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-shadow: 0 1px 3px rgba(0,0,0,0.14);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="topline">
      <span id="time" class="time">--:--</span>
      <span id="temp" class="temp">--°C</span>
      <span id="city" class="city">Loading...</span>
    </div>
    <div id="main" class="main">LIVE</div>
    <div id="sub" class="sub">IRL HUD</div>
  </div>

  <script>
    const timeEl = document.getElementById("time");
    const tempEl = document.getElementById("temp");
    const cityEl = document.getElementById("city");

    function updateTime() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      timeEl.textContent = `${hh}:${mm}`;
    }

    async function loadLocationWeather() {
      try {
        const ipRes = await fetch("https://ipapi.co/json/");
        const ipData = await ipRes.json();

        const city = ipData.city || "Unknown city";
        const lat = ipData.latitude;
        const lon = ipData.longitude;

        cityEl.textContent = city;

        if (typeof lat === "number" && typeof lon === "number") {
          const weatherRes = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`
          );
          const weatherData = await weatherRes.json();
          const temp = weatherData.current?.temperature_2m;

          tempEl.textContent =
            typeof temp === "number" ? `${Math.round(temp)}°C` : "--°C";
        } else {
          tempEl.textContent = "--°C";
        }
      } catch (error) {
        cityEl.textContent = "Location unavailable";
        tempEl.textContent = "--°C";
      }
    }

    updateTime();
    setInterval(updateTime, 1000);
    loadLocationWeather();
    setInterval(loadLocationWeather, 300000);
  </script>
</body>
</html>
