<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apple Glass HUD</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#hud {
  position: absolute;
  top: 20px;
  left: 20px;

  min-width: 360px;
  padding: 18px 22px 16px;
  border-radius: 26px;

  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.22);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.28),
    inset 0 1px 0 rgba(255,255,255,0.18);
}

/* TOP */
#top {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.badge {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  background: rgba(255,255,255,0.14);
  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.16);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}

#time {
  color: #8fd8ff;
}

#weather {
  color: #9eff9e;
}

#location {
  color: #ffffff;
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* SPEED */
#speedWrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

#speed {
  font-size: 100px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -3px;
  color: #ffffff;

  text-shadow:
    0 2px 4px rgba(0,0,0,0.35),
    0 0 10px rgba(255,255,255,0.12);
}

#unit {
  font-size: 22px;
  font-weight: 700;
  color: rgba(255,255,255,0.95);
  margin-bottom: 14px;
}

/* DIRECTION */
#dir {
  margin-top: 8px;
  font-size: 24px;
  font-weight: 800;
  color: rgba(255,255,255,0.96);
  text-shadow: 0 1px 2px rgba(0,0,0,0.35);
}

/* SPEED COLORS */
.speed-stop { color: #ffffff; }
.speed-walk { color: #dfffe2; }
.speed-ride { color: #d8f3ff; }
.speed-fast { color: #fff0cc; }
.speed-vfast { color: #ffe1fb; }

</style>
</head>

<body>

<div id="hud">
  <div id="top">
    <div id="time" class="badge">--:--</div>
    <div id="weather" class="badge">--°C</div>
    <div id="location" class="badge">Locating...</div>
  </div>

  <div id="speedWrap">
    <div id="speed" class="speed-stop">0.0</div>
    <div id="unit">km/h</div>
  </div>

  <div id="dir">--</div>
</div>

<script>
// TIME
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime, 1000);
updateTime();

// WEATHER by current GPS
async function getWeather(lat, lon) {
  try {
    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
    );
    const data = await res.json();
    const temp = data.current_weather.temperature;
    document.getElementById("weather").innerText = temp + "°C";
  } catch {
    document.getElementById("weather").innerText = "--°C";
  }
}

// CITY ONLY
async function getLocation(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`,
      {
        headers: {
          "Accept-Language": "en"
        }
      }
    );
    const data = await res.json();
    const addr = data.address || {};

    const city =
      addr.city ||
      addr.town ||
      addr.village ||
      addr.municipality ||
      addr.county ||
      addr.state ||
      "Unknown city";

    document.getElementById("location").innerText = city;
  } catch {
    document.getElementById("location").innerText = "Location unavailable";
  }
}

// DIRECTION
function getDir(deg) {
  if (deg == null || isNaN(deg)) return "--";
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(deg / 45) % 8] + " ↑";
}

// SPEED COLOR
function setSpeedClass(kmh) {
  const el = document.getElementById("speed");
  el.className = "";

  if (kmh < 1) el.classList.add("speed-stop");
  else if (kmh < 7) el.classList.add("speed-walk");
  else if (kmh < 18) el.classList.add("speed-ride");
  else if (kmh < 35) el.classList.add("speed-fast");
  else el.classList.add("speed-vfast");
}

// GPS
let lastLocationUpdate = 0;
let lastWeatherUpdate = 0;

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      let speed = pos.coords.speed || 0;
      let kmh = speed * 3.6;

      let display = kmh < 0.5
        ? (Math.random() * 0.2).toFixed(1)
        : kmh.toFixed(1);

      document.getElementById("speed").innerText = display;
      document.getElementById("dir").innerText = getDir(pos.coords.heading);

      setSpeedClass(kmh);

      const now = Date.now();

      if (now - lastWeatherUpdate > 60000) {
        getWeather(lat, lon);
        lastWeatherUpdate = now;
      }

      if (now - lastLocationUpdate > 30000) {
        getLocation(lat, lon);
        lastLocationUpdate = now;
      }
    },
    () => {
      document.getElementById("speed").innerText = "0.0";
      document.getElementById("dir").innerText = "--";
      document.getElementById("location").innerText = "GPS denied";
      setSpeedClass(0);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    }
  );
}
</script>

</body>
</html>
