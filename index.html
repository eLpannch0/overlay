<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; background:transparent; overflow:hidden; font-family:Arial; }

/* TOP BAR */
#top {
  position:absolute;
  top:20px;
  left:20px;
  padding:12px 20px;
  border-radius:20px;
  background:rgba(80,80,80,0.85);
  color:#fff;
  font-size:22px;
  display:flex;
  gap:12px;
  align-items:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* RED DOT */
.dot {
  width:10px;
  height:10px;
  background:#ff3b3b;
  border-radius:50%;
}

/* TIME BLOCK */
#timeBox {
  position:absolute;
  top:90px;
  left:20px;
  padding:18px 26px;
  border-radius:20px;
  background:rgba(80,80,80,0.85);
  color:#fff;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

#timeLabel {
  font-size:16px;
  opacity:0.7;
}

#time {
  font-size:42px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="top">
  <div class="dot"></div>
  <div id="city">Ottawa</div>
  <div id="temp">-1°C</div>
</div>

<div id="timeBox">
  <div id="timeLabel">TIME</div>
  <div id="time">00:00</div>
</div>

<script>
// TIME UPDATE
function updateTime() {
  const now = new Date();
  let h = now.getHours().toString().padStart(2, '0');
  let m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById("time").innerText = `${h}:${m}`;
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
